name: Build Modified APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl unzip zipalign openjdk-11-jdk
        
    - name: Download tools
      run: |
        # 下载apktool
        wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.8.1/apktool_2.8.1.jar -O apktool.jar
        wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
        chmod +x apktool
        
        # 下载签名工具
        wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar
        
    - name: Get latest APK
      run: |
        # 获取最新发布的APK
        LATEST_URL=$(curl -s https://api.github.com/repos/luoxingran/dolby_beta/releases/latest | grep browser_download_url | grep .apk | head -1 | cut -d '"' -f 4)
        wget -O original.apk "$LATEST_URL"
        
    - name: Update UnblockNeteaseMusic
      run: |
        git clone --depth=1 https://github.com/UnblockNeteaseMusic/server.git
        cd server && zip -r ../UnblockNeteaseMusic.zip . && cd ..
        
    - name: Decompile and modify
      run: |
        ./apktool d original.apk -o decoded

        rm -rf unblock_tmp
        mkdir unblock_tmp
        unzip -q UnblockNeteaseMusic.zip -d unblock_tmp

        python3 - <<'PY'
        from pathlib import Path

        p = Path("unblock_tmp/precompiled/app.js")
        s = p.read_text(encoding="utf-8")

        old = "l=Number(process.env.MIN_BR)||0"
        new = "l=999e3"

        if old not in s:
            raise SystemExit("没有找到 MIN_BR 压缩代码，可能 server 版本结构变了")

        s = s.replace(old, new, 1)
        p.write_text(s, encoding="utf-8")

        print("已修改 precompiled/app.js:", old, "=>", new)
        PY

        # 可选：源码也一起改，虽然默认不跑 src
        if [ -f unblock_tmp/src/hook.js ]; then
          sed -i 's/const min_br = Number(process.env.MIN_BR) || 0;/const min_br = 999000;/g' unblock_tmp/src/hook.js
        fi

        cd unblock_tmp
        zip -qr ../UnblockNeteaseMusic_patched.zip .
        cd ..

        cp UnblockNeteaseMusic_patched.zip decoded/assets/UnblockNeteaseMusic.zip
        
    - name: Rebuild APK
      run: |
        ./apktool b decoded -o unsigned.apk
        
    - name: Sign APK
      run: |
        java -jar uber-apk-signer-1.3.0.jar \
          --apks unsigned.apk \
          --ks app/lin.jks \
          --ksAlias lin \
          --ksPass 123456 \
          --ksKeyPass 123456 \
          --out .
        mv unsigned-aligned-signed.apk dolby_beta_modified.apk
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: modified-apk
        path: dolby_beta_modified.apk
        retention-days: 30
